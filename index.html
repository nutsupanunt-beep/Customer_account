<html lang="th" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <!-- เพิ่ม Theme Color เพื่อให้ Status Bar มือถือสีกลืนกับแอป -->
  <meta name="theme-color" content="#ffffff" id="meta-theme-color">
  <title>ระบบจัดการลูกค้า (Supabase)</title>
  
  <!-- ========================================== -->
  <!-- ส่วนที่แก้ไข: ใช้โลโก้จากไฟล์ edited-image.png -->
  <!-- ========================================== -->
  <!-- 1. ไอคอนบนแถบ Browser -->
  <link rel="icon" type="image/x-icon" href="edited-image.ico">

  <!-- Import Supabase Client -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <!-- Supabase Data SDK Implementation -->
  <script>
    // Configuration
    const savedConfig = JSON.parse(localStorage.getItem('app_supabase_config') || '{}');
    var defaultSupabaseUrl = 'https://rmdlpaofydzbuzuozofs.supabase.co';
    var defaultSupabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJtZGxwYW9meWR6YnV6dW96b2ZzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njg0NzMwMjIsImV4cCI6MjA4NDA0OTAyMn0.JoWZ4m0TrQMgIX5kJEILv6nJbdc9hB-H82DDWPG09A4';

    var supabaseUrl = savedConfig.url || defaultSupabaseUrl;
    var supabaseKey = savedConfig.key || defaultSupabaseKey;
    
    var supabaseClient = null;
    try {
        if (window.supabase && window.supabase.createClient) {
            supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);
        } else {
            console.error("Supabase library not loaded correctly.");
        }
    } catch (e) {
        console.error("Failed to initialize Supabase:", e);
    }

    async function fetchAndNotify() {
        if (!supabaseClient) {
            if (window._dataHandler) window._dataHandler.onDataChanged([]);
            return;
        }
        try {
            const { data, error } = await supabaseClient.from('app_records').select('data');
            if (error) throw error;
            if (data && window._dataHandler) {
                const appData = data.map(row => row.data);
                window._dataHandler.onDataChanged(appData);
            }
        } catch (e) {
            console.error("Error fetching data:", e);
            if (e.code === '42P01' || e.message.includes('does not exist')) showSetupModal();
            else if (e.code === '42501') showSetupModal("Permission Denied (RLS)");
            else showConnectionErrorModal(e.message);
            if (window._dataHandler) window._dataHandler.onDataChanged([]);
        }
    }

    function showConnectionErrorModal(msg) {
        if(document.getElementById('setup-modal-overlay')) return;
        const modalId = 'setup-modal-overlay';
        const div = document.createElement('div');
        div.id = modalId;
        div.className = 'modal-overlay';
        div.style.zIndex = '9999';
        div.innerHTML = `
            <div class="modal-content relative" style="max-width: 500px; border-left: 6px solid #ef4444;">
                <h3 class="text-xl font-bold mb-4 text-red-600">⚠️ เชื่อมต่อฐานข้อมูลไม่สำเร็จ</h3>
                <p class="mb-4 text-gray-700">ระบบไม่สามารถเชื่อมต่อกับ Supabase ได้</p>
                <div class="bg-gray-100 p-3 rounded text-xs text-gray-600 mb-4 break-all font-mono">
                    ${msg}
                </div>
                <p class="text-sm text-gray-500 mb-4">กรุณาตรวจสอบ URL หรือ Key ในหน้าตั้งค่า</p>
                <button onclick="document.getElementById('${modalId}').remove()" class="w-full py-2 bg-gray-200 rounded hover:bg-gray-300">ปิดหน้าต่าง</button>
            </div>
        `;
        document.body.appendChild(div);
    }

    function showSetupModal(type = "Missing Table") {
        const modalId = 'setup-modal-overlay';
        if (document.getElementById(modalId)) return;
        const div = document.createElement('div');
        div.id = modalId;
        div.className = 'modal-overlay';
        div.style.zIndex = '9999';
        div.innerHTML = `
            <div class="modal-content relative" style="max-width: 600px; border-left: 6px solid #ef4444;">
                <h3 class="text-xl font-bold mb-4 text-red-600">⚠️ แจ้งเตือนระบบ</h3>
                <p class="mb-4 text-gray-700">ไม่สามารถโหลดข้อมูลได้ (${type})</p>
                <button onclick="document.getElementById('${modalId}').remove()" class="w-full py-2 bg-gray-200 rounded hover:bg-gray-300">ปิดหน้าต่าง</button>
            </div>
        `;
        document.body.appendChild(div);
    }

    window.dataSdk = {
      init: async (handler) => {
        window._dataHandler = handler;
        if (supabaseClient) {
            await fetchAndNotify(); 
            supabaseClient.channel('public:app_records')
                .on('postgres_changes', { event: '*', schema: 'public', table: 'app_records' }, () => {
                    fetchAndNotify();
                })
                .subscribe();
        } else {
            setTimeout(() => handler.onDataChanged([]), 0);
        }
        return { isOk: true };
      },
      create: async (record) => {
        if (!supabaseClient) return { isOk: false, error: { message: "Offline" } };
        try {
          const { error } = await supabaseClient.from('app_records').insert({ id: record.id, type: record.type, data: record });
          if (error) throw error;
          await fetchAndNotify(); 
          return { isOk: true };
        } catch (e) {
          if (e.code === '42P01') showSetupModal();
          return { isOk: false, error: { message: e.message } };
        }
      },
      update: async (record) => {
        if (!supabaseClient) return { isOk: false, error: { message: "Offline" } };
        try {
          const { error } = await supabaseClient.from('app_records').update({ data: record, type: record.type }).eq('id', record.id);
          if (error) throw error;
          await fetchAndNotify();
          return { isOk: true };
        } catch (e) { return { isOk: false, error: { message: e.message } }; }
      },
      delete: async (record) => {
        if (!supabaseClient) return { isOk: false, error: { message: "Offline" } };
        try {
          const { error } = await supabaseClient.from('app_records').delete().eq('id', record.id);
          if (error) throw error;
          await fetchAndNotify();
          return { isOk: true };
        } catch (e) { return { isOk: false, error: { message: e.message } }; }
      }
    };

    window.elementSdk = {
      config: null,
      init: async (options) => {
        window.elementSdk.config = options.defaultConfig;
        if(options.onConfigChange) options.onConfigChange(window.elementSdk.config);
        return { isOk: true };
      },
      setConfig: (newConfig) => {
        window.elementSdk.config = { ...window.elementSdk.config, ...newConfig };
      }
    };
  </script>

  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>

    * { font-family: 'Sarabun', sans-serif; }
    .sidebar-item { transition: all 0.2s ease; }
    .sidebar-item:hover { transform: translateX(4px); }
    .card-hover { transition: all 0.3s ease; }
    .card-hover:hover { transform: translateY(-2px); box-shadow: 0 8px 16px rgba(0, 0, 0, 0.1); }
    .dark .card-hover:hover { box-shadow: 0 8px 16px rgba(0, 0, 0, 0.3); }
    .payment-disabled { opacity: 0.5; cursor: not-allowed; }
    .fade-in { animation: fadeIn 0.3s ease-in; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .spinner { border: 3px solid rgba(255, 255, 255, 0.3); border-radius: 50%; border-top-color: currentColor; width: 24px; height: 24px; animation: spin 0.8s linear infinite; }

    .dark .modal-content { background: #1f2937; }

    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

  <style>@view-transition { navigation: auto; }</style>

 <body class="h-full">
  <div id="app" class="h-full w-full overflow-hidden flex items-center justify-center">
      <div class="flex flex-col items-center gap-4 text-gray-500">
          <div class="spinner text-blue-500" style="width: 40px; height: 40px;"></div>
          <p>กำลังโหลดระบบ...</p>
      </div>
  </div>
  <script>
    const defaultConfig = {
      app_title: "ระบบจัดการลูกค้า",
      menu_add_customer: "เพิ่มข้อมูลลูกค้า",
      menu_manage_customer: "จัดการรายการลูกค้า",
      menu_history: "ประวัติการทำรายการ",
      menu_settings: "การตั้งค่า",
      menu_account: "บัญชีผู้ใช้",
      menu_changelog: "ประวัติการอัปเดต",
      primary_color: "#3b82f6",
      secondary_color: "#1f2937",
      text_color: "#111827",
      background_color: "#f3f4f6",
      surface_color: "#ffffff"
    };

    let allRecords = [];
    let currentUser = null;
    let currentView = 'manage'; // Default view
    let editingCustomer = null;
    let editingUser = null;
    let confirmDeleteId = null;
    let showingModal = null;
    let isMobileSidebarOpen = false;
    let manageSearchTerm = '';
    let expandedCustomerName = null;

    const dataHandler = {
      onDataChanged(data) {
        allRecords = data || [];
        renderApp();
      }
    };

    window.toggleCustomerExpand = function(name) {
        if (expandedCustomerName === name) {
            expandedCustomerName = null; 
        } else {
            expandedCustomerName = name; 
        }
        renderApp();
    };

    function showToast(message, isError = false) {
      const toast = document.createElement('div');
      toast.className = `toast ${isError ? 'error' : ''}`;
      toast.textContent = message;
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 20000); // 20 seconds
    }

    function showModal(content) { showingModal = content; renderApp(); }
    function hideModal() { showingModal = null; editingUser = null; editingCustomer = null; confirmDeleteId = null; renderApp(); }
    function toggleMobileSidebar() { isMobileSidebarOpen = !isMobileSidebarOpen; renderApp(); }

    function hashPassword(password) {
      let hash = 0;
      for (let i = 0; i < password.length; i++) {
        const char = password.charCodeAt(i);
        hash = ((hash << 5) - hash) + char;
        hash = hash & hash;
      }
      return hash.toString();
    }

    function checkLogin() {
      // Check localStorage first (remember me), then sessionStorage
      let savedUser = localStorage.getItem('currentUser') || sessionStorage.getItem('currentUser');
      if (savedUser) {
        currentUser = JSON.parse(savedUser);
        if (currentUser.isGuestView && currentView === 'add') currentView = 'manage';
      }
    }

    function login(username, password, rememberMe = false) {
      if (username === 'admin' && password === 'admin') {
        currentUser = { id: 'super_admin', username: 'Admin (Super)', isAdmin: true };
        
        if (rememberMe) localStorage.setItem('currentUser', JSON.stringify(currentUser));
        else sessionStorage.setItem('currentUser', JSON.stringify(currentUser));

        showToast('เข้าสู่ระบบ Super Admin สำเร็จ');
        renderApp();
        return true;
      }
      const userRecord = allRecords.find(r => r.type === 'user' && r.username === username && r.password_hash === hashPassword(password));
      if (userRecord) {
        currentUser = { username: userRecord.username, id: userRecord.id };
        
        if (rememberMe) localStorage.setItem('currentUser', JSON.stringify(currentUser));
        else sessionStorage.setItem('currentUser', JSON.stringify(currentUser));

        showToast('เข้าสู่ระบบสำเร็จ');
        renderApp();
        return true;
      }
      return false;
    }

    function logout() {
      const wasGuest = currentUser && currentUser.isGuestView;
      currentUser = null;
      currentView = 'manage'; 
      isMobileSidebarOpen = false;
      
      // ลบข้อมูลการล็อกอินทั้ง 2 แบบ
      localStorage.removeItem('currentUser');
      sessionStorage.removeItem('currentUser');
      
      showToast(wasGuest ? 'กลับไปหน้าหลัก' : 'ออกจากระบบสำเร็จ');
      renderApp();
    }

    async function register(username, password) {
      const exists = allRecords.find(r => r.type === 'user' && r.username === username);
      if (exists) { showToast('ชื่อผู้ใช้นี้มีอยู่แล้ว', true); return false; }
      const userRecord = { type: 'user', id: 'user_' + Date.now(), username: username, password_hash: hashPassword(password), created_at: new Date().toISOString() };
      const result = await window.dataSdk.create(userRecord);
      if (result.isOk) { showToast('ลงทะเบียนสำเร็จ'); return true; } 
      else { showToast('เกิดข้อผิดพลาด: ' + result.error.message, true); return false; }
    }

    async function resetPassword(username, adminKey, newPassword) {
      if (adminKey !== 'admin') { showToast('รหัส admin ไม่ถูกต้อง', true); return false; }
      const userRecord = allRecords.find(r => r.type === 'user' && r.username === username);
      if (!userRecord) { showToast('ไม่พบชื่อผู้ใช้นี้', true); return false; }
      const updatedRecord = { ...userRecord, password_hash: hashPassword(newPassword), updated_at: new Date().toISOString() };
      const result = await window.dataSdk.update(updatedRecord);
      if (result.isOk) { showToast('รีเซ็ตรหัสผ่านสำเร็จ'); return true; } 
      else { showToast('เกิดข้อผิดพลาด: ' + result.error.message, true); return false; }
    }

    function getUserSettings() {
      if (!currentUser) return null;
      const defaultSettings = { 
          is_dark_mode: false, 
          payment_days_before: 5, 
          guest_permissions: currentUser.isAdmin ? 'add,manage,history,settings,edit,changelog' : 'manage,history,changelog',
      };

      if (currentUser.isGuestView) {
        const adminSettings = getGlobalGuestSettings();
        if (adminSettings) {
             return { ...defaultSettings, ...adminSettings, guest_permissions: 'manage' };
        }
        return { ...defaultSettings, guest_permissions: 'manage' };
      }
      
      const userSettings = allRecords.find(r => r.type === 'settings' && r.account_id === currentUser.id);
      return { ...defaultSettings, ...userSettings }; 
    }
    
    function getGlobalGuestSettings() {
        const adminSettings = allRecords.find(r => r.type === 'settings' && r.account_id === 'super_admin');
        if (adminSettings) return adminSettings;
        return null;
    }

    function getGlobalLogoSettings() {
        return { login: 280, sidebar: 160 }; 
    }

    async function saveSettings(data) {
      if (!currentUser || currentUser.isGuestView) return;
      const existing = allRecords.find(r => r.type === 'settings' && r.account_id === currentUser.id);
      
      const updatedData = { 
          ...data,
          updated_at: new Date().toISOString() 
      };
      
      if (existing) { await window.dataSdk.update({ ...existing, ...updatedData }); } 
      else { await window.dataSdk.create({ type: 'settings', id: 'settings_' + Date.now(), account_id: currentUser.id, ...updatedData }); }
      
      showToast('บันทึกการตั้งค่าสำเร็จ');
    }

    function canAccessView(view) {
      if (!currentUser) return false;
      if (currentUser.isAdmin) return true;
      
      if (currentUser.isGuestView) {
          const targetSettings = allRecords.find(r => r.type === 'settings' && r.account_id === currentUser.targetAccountId);
          if (targetSettings && targetSettings.guest_permissions) {
              return targetSettings.guest_permissions.includes(view);
          }
          const adminSettings = allRecords.find(r => r.type === 'settings' && r.account_id === 'super_admin');
          if (adminSettings && adminSettings.guest_permissions) {
              return adminSettings.guest_permissions.includes(view);
          }
          return 'manage,history,changelog'.includes(view);
      }
      
      return true;
    }
    
    function canEditData() {
        if (!currentUser) return false;
        if (currentUser.isAdmin) return true;
        
        if (currentUser.isGuestView) {
             const targetSettings = allRecords.find(r => r.type === 'settings' && r.account_id === currentUser.targetAccountId);
             if (targetSettings && targetSettings.guest_permissions) {
                 return targetSettings.guest_permissions.includes('edit');
             }
             const adminSettings = allRecords.find(r => r.type === 'settings' && r.account_id === 'super_admin');
             if (adminSettings && adminSettings.guest_permissions) {
                 return adminSettings.guest_permissions.includes('edit');
             }
             return false;
        }
        return true;
    }

    function isDarkMode() {
      if (currentUser) { const s = getUserSettings(); return s ? s.is_dark_mode : false; }
      const s = getGlobalGuestSettings(); return s ? s.is_dark_mode : false;
    }

    function getPaymentDaysBefore() {
      if (currentUser) { const s = getUserSettings(); return s ? s.payment_days_before : 5; }
      const s = getGlobalGuestSettings(); return s ? s.payment_days_before : 5;
    }

    function calculateMonthlyPayment(principal, interestRate, installments, billFee = 0) {
      if (!principal || !installments) return 0;
      const monthlyInterest = interestRate / 100;
      const baseTotalAmount = principal * (1 + (monthlyInterest * installments));
      return Math.round(baseTotalAmount / installments) + billFee;
    }

    function addMonthsToDate(dateStr, months) {
      const date = new Date(dateStr);
      date.setMonth(date.getMonth() + months);
      return date.toISOString().split('T')[0];
    }

    function canPayNow(nextPaymentDate, daysBefore) {
      const today = new Date();
      const paymentDate = new Date(nextPaymentDate);
      const daysUntil = Math.ceil((paymentDate - today) / (1000 * 60 * 60 * 24));
      return daysUntil <= daysBefore;
    }

    function getLenderColor(name, isDark) {
        if (!name || name === '-') return isDark ? '#9ca3af' : '#6b7280'; 
        let hash = 0;
        for (let i = 0; i < name.length; i++) {
            hash = name.charCodeAt(i) + ((hash << 5) - hash);
        }
        const colorsLight = ['#2563eb', '#dc2626', '#16a34a', '#9333ea', '#ea580c', '#0d9488', '#db2777', '#4f46e5', '#ca8a04', '#059669'];
        const colorsDark = ['#60a5fa', '#f87171', '#4ade80', '#c084fc', '#fb923c', '#2dd4bf', '#f472b6', '#818cf8', '#facc15', '#34d399'];
        const index = Math.abs(hash) % colorsLight.length;
        return isDark ? colorsDark[index] : colorsLight[index];
    }

    function getAutocompleteData() {
      return JSON.parse(localStorage.getItem('app_autocomplete_options') || '{"names":[], "products":[], "prices":[], "interests":[], "installments":[], "fees":[]}');
    }
    
    function saveAutocompleteData(data) {
      const current = getAutocompleteData();
      const addUnique = (arr, val) => { if(val !== undefined && val !== null && val !== '' && !arr.includes(val)) arr.push(val); };
      addUnique(current.names, data.customerName); addUnique(current.products, data.product); addUnique(current.prices, data.productPrice);
      addUnique(current.interests, data.interestRate); addUnique(current.installments, data.installments); addUnique(current.fees, data.billFee);
      localStorage.setItem('app_autocomplete_options', JSON.stringify(current));
    }

    async function addCustomer(customerData) {
      if (allRecords.filter(r => r.type === 'customer').length >= 999) return showToast('ถึงขีดจำกัด 999 รายการแล้ว', true);
      let monthlyPayment = customerData.billAmount ? parseInt(customerData.billAmount) : calculateMonthlyPayment(customerData.productPrice, customerData.interestRate, customerData.installments, customerData.billFee);
      const newCustomer = {
        type: 'customer', id: 'cust_' + Date.now(), customer_name: customerData.customerName,
        product: customerData.product, product_price: customerData.productPrice, interest_rate: customerData.interestRate,
        bill_fee: customerData.billFee, bill_amount: monthlyPayment, installments: customerData.installments,
        contract_date: customerData.contractDate, monthly_payment: monthlyPayment, paid_installments: 0,
        next_payment_date: addMonthsToDate(customerData.contractDate, 1), status: 'active',
        account_id: currentUser ? currentUser.id : 'guest', created_at: new Date().toISOString()
      };
      const result = await window.dataSdk.create(newCustomer);
      if (result.isOk) {
        // V.9.2 Detailed Add History
        await addHistory('เพิ่มข้อมูล', `เพิ่มข้อมูลลูกค้า <b>${customerData.customerName}</b><br><span class="block mt-1.5 p-2 rounded bg-gray-50 dark:bg-gray-800 border border-gray-200 dark:border-gray-700 text-xs"><b>รายละเอียด:</b><br>• สินค้า: ${customerData.product}<br>• ราคา: ฿${(customerData.productPrice||0).toLocaleString()}</span>`);
        saveAutocompleteData(customerData); showToast('เพิ่มข้อมูลลูกค้าสำเร็จ');
      } else showToast('เกิดข้อผิดพลาด: ' + result.error.message, true);
    }

    async function updateCustomer(customerId, updates) {
      const customer = allRecords.find(r => r.id === customerId); if (!customer) return;
      
      // V.9.2: Calculate specific changes for detailed history
      let changes = [];
      if (customer.customer_name !== updates.customer_name) changes.push(`ชื่อลูกค้า: ${customer.customer_name} ➔ ${updates.customer_name}`);
      if (customer.product !== updates.product) changes.push(`สินค้า: ${customer.product} ➔ ${updates.product}`);
      if (parseFloat(customer.product_price || 0) !== parseFloat(updates.product_price || 0)) changes.push(`ราคาสินค้า: ฿${(customer.product_price||0).toLocaleString()} ➔ ฿${(updates.product_price||0).toLocaleString()}`);
      if (parseFloat(customer.monthly_payment || 0) !== parseFloat(updates.monthly_payment || 0)) changes.push(`ค่างวด: ฿${(customer.monthly_payment||0).toLocaleString()} ➔ ฿${(updates.monthly_payment||0).toLocaleString()}`);
      if (parseInt(customer.installments || 0) !== parseInt(updates.installments || 0)) changes.push(`จำนวนงวด: ${customer.installments} ➔ ${updates.installments}`);
      if (customer.contract_date !== updates.contract_date) changes.push(`วันที่ทำสัญญา: ${customer.contract_date} ➔ ${updates.contract_date}`);

      let details = `แก้ไขข้อมูลของ <b>${customer.customer_name}</b> (รายการ: ${customer.product})`;
      if (changes.length > 0) {
          details += `<span class="block mt-1.5 p-2 rounded bg-gray-50 dark:bg-gray-800 border border-gray-200 dark:border-gray-700 text-xs text-gray-700 dark:text-gray-300"><b>รายการที่ถูกปรับเปลี่ยน:</b><br>• ${changes.join('<br>• ')}</span>`;
      } else {
          details += `<span class="block mt-1.5 p-2 rounded bg-gray-50 dark:bg-gray-800 border border-gray-200 dark:border-gray-700 text-xs text-gray-700 dark:text-gray-300">ไม่มีการเปลี่ยนค่าใดๆ</span>`;
      }

      const result = await window.dataSdk.update({ ...customer, ...updates, updated_at: new Date().toISOString() });
      if (result.isOk) { 
          await addHistory('แก้ไขข้อมูล', details); 
          showToast('แก้ไขข้อมูลสำเร็จ'); 
          hideModal(); 
      } 
      else showToast('เกิดข้อผิดพลาด: ' + result.error.message, true);
    }

    async function makePayment(customerId) {
      const customer = allRecords.find(r => r.id === customerId); if (!customer) return;
      const newPaid = customer.paid_installments + 1;
      const isComplete = newPaid >= customer.installments;
      const updates = isComplete ? { paid_installments: newPaid, status: 'completed' } : { paid_installments: newPaid, next_payment_date: addMonthsToDate(customer.next_payment_date, 1) };
      const result = await window.dataSdk.update({ ...customer, ...updates, updated_at: new Date().toISOString() });
      if (result.isOk) { 
        const remaining = customer.installments - newPaid;
        const details = `${customer.customer_name} ชำระเงินค่า ${customer.product} งวดที่ ${newPaid} ราคา ${customer.monthly_payment.toLocaleString()} บาท สำเร็จ จำนวนงวดที่เหลืออีก ${remaining} งวด`;
        await addHistory(isComplete ? 'ชำระเงินครบ' : 'ชำระเงิน', details); 
        showToast(isComplete ? 'ชำระเงินครบแล้ว' : 'บันทึกการชำระเงินสำเร็จ'); 
      }
    }

    async function payAllForCustomer(name) {
        const daysBefore = getPaymentDaysBefore();
        const targets = getActiveCustomers().filter(c => c.customer_name === name && canPayNow(c.next_payment_date, daysBefore));
        if(targets.length === 0) {
            showToast('ไม่มีรายการที่ถึงกำหนดชำระ', true);
            return;
        }
        
        let count = 0;
        for (const c of targets) {
            const newPaid = c.paid_installments + 1;
            const isComplete = newPaid >= c.installments;
            
            const updates = isComplete 
                ? { paid_installments: newPaid, status: 'completed', updated_at: new Date().toISOString() } 
                : { paid_installments: newPaid, next_payment_date: addMonthsToDate(c.next_payment_date, 1), updated_at: new Date().toISOString() };
                
            const result = await window.dataSdk.update({ ...c, ...updates });
            if (result.isOk) {
                 const remaining = c.installments - newPaid;
                 const details = `${c.customer_name} ชำระเงินค่า ${c.product} งวดที่ ${newPaid} ราคา ${c.monthly_payment.toLocaleString()} บาท สำเร็จ จำนวนงวดที่เหลืออีก ${remaining} งวด`;
                 await addHistory(isComplete ? 'ชำระเงินครบ' : 'ชำระเงิน', details);
                 count++;
            }
        }
        showToast(`ชำระเงินเรียบร้อย ${count} รายการ`);
    }

      const customer = allRecords.find(r => r.id === customerId); if (!customer) return;

    async function adminResetPassword(userId, newPassword) {
        const user = allRecords.find(r => r.id === userId && r.type === 'user'); if(!user) return;

    async function addHistory(action, details) {
      await window.dataSdk.create({ type: 'history', id: 'hist_' + Date.now(), history_action: action, history_details: details, history_date: new Date().toISOString(), account_id: currentUser ? currentUser.id : 'guest' });
    }

    function getActiveCustomers() {
      if (currentUser && currentUser.isAdmin) return allRecords.filter(r => r.type === 'customer' && r.status === 'active');
      if (currentUser && currentUser.isGuestView) {
          if (currentUser.targetAccountId === 'ALL') return allRecords.filter(r => r.type === 'customer' && r.status === 'active');
          return allRecords.filter(r => r.type === 'customer' && r.status === 'active' && r.account_id === currentUser.targetAccountId);
      }
      return allRecords.filter(r => r.type === 'customer' && r.status === 'active' && (currentUser ? r.account_id === currentUser.id : true));
    }

    function getCompletedCustomers() {
      if (currentUser && currentUser.isAdmin) return allRecords.filter(r => r.type === 'customer' && r.status === 'completed');
      if (currentUser && currentUser.isGuestView) {
          if (currentUser.targetAccountId === 'ALL') return allRecords.filter(r => r.type === 'customer' && r.status === 'completed');
          return allRecords.filter(r => r.type === 'customer' && r.status === 'completed' && r.account_id === currentUser.targetAccountId);
      }
      return allRecords.filter(r => r.type === 'customer' && r.status === 'completed' && (currentUser ? r.account_id === currentUser.id : true));
    }

    function getHistoryRecords() {
      const sorter = (a, b) => new Date(b.history_date) - new Date(a.history_date);
      if (currentUser && currentUser.isAdmin) return allRecords.filter(r => r.type === 'history').sort(sorter);
      if (currentUser && currentUser.isGuestView) {
          if (currentUser.targetAccountId === 'ALL') return allRecords.filter(r => r.type === 'history').sort(sorter);
          return allRecords.filter(r => r.type === 'history' && r.account_id === currentUser.targetAccountId).sort(sorter);
      }
      return allRecords.filter(r => r.type === 'history' && (currentUser ? r.account_id === currentUser.id : true)).sort(sorter);
    }

    function getCustomersSummary(customersList) {
      const customers = customersList || getActiveCustomers();
      const summary = {};
      customers.forEach(c => {
        if (!summary[c.customer_name]) {
            summary[c.customer_name] = { 
                name: c.customer_name, 
                totalNextMonth: 0, 
                count: 0, 
                lenderTotals: {} 
            };
        }
        summary[c.customer_name].totalNextMonth += c.monthly_payment; 
        summary[c.customer_name].count += 1;
        
        let ownerName = '-';
        const o = allRecords.find(r => r.type === 'user' && r.id === c.account_id);
        if (o) ownerName = o.username;
        
        if (!summary[c.customer_name].lenderTotals[ownerName]) {
            summary[c.customer_name].lenderTotals[ownerName] = 0;
        }
        summary[c.customer_name].lenderTotals[ownerName] += c.monthly_payment;
      });
      return Object.values(summary);
    }

    function renderManageCustomers(config, dark, surfaceColor, textColor, primaryColor, secondaryColor) {
      let customers = getActiveCustomers();
      
      if (manageSearchTerm) {
          const term = manageSearchTerm.toLowerCase();
          customers = customers.filter(c => 
              c.customer_name.toLowerCase().includes(term) || 
              c.product.toLowerCase().includes(term)
          );
      }
      
      customers.sort((a, b) => a.customer_name.localeCompare(b.customer_name, 'th'));
      const summary = getCustomersSummary(customers);
      const grandTotal = summary.reduce((sum, item) => sum + item.totalNextMonth, 0);

      const daysBefore = getPaymentDaysBefore();
      const isAdmin = currentUser && currentUser.isAdmin;
      const isGuestView = currentUser && currentUser.isGuestView;
      const isSpecialView = isAdmin || isGuestView;

            <input type="text" id="manage-search-input" value="${manageSearchTerm}" placeholder="ค้นหา" 
                class="w-full px-4 py-3 pl-10 rounded-lg border shadow-sm focus:ring-2 focus:ring-opacity-50 transition-all" 
                style="background: ${dark ? '#374151' : 'white'}; border-color: ${dark ? '#4b5563' : '#d1d5db'}; color: ${textColor}; outline-color: ${primaryColor};">

                        <p class="text-base font-bold opacity-80 mb-1" style="color: ${textColor};">ยอดรวมที่ต้องชำระทั้งหมด</p>
                        <p class="text-4xl font-black tracking-tight" style="color: ${primaryColor};">฿${grandTotal.toLocaleString()}</p>
                    </div>
                </div>

                ${summary.length===0?`<p class="text-center py-4 opacity-50" style="color: ${textColor};">ไม่พบข้อมูล</p>`:''}
                ${summary.map(s=>{
                  const customerItems = customers.filter(c => c.customer_name === s.name);
                  
                  // NEW V.8.2: Sort customer items alphabetically by lender name (account owner's username)
                  customerItems.sort((a, b) => {
                      let ownerA = '-';
                      const userA = allRecords.find(r => r.type === 'user' && r.id === a.account_id);
                      if(userA) ownerA = userA.username;
                      
                      let ownerB = '-';
                      const userB = allRecords.find(r => r.type === 'user' && r.id === b.account_id);
                      if(userB) ownerB = userB.username;
                      
                      return ownerA.localeCompare(ownerB, 'th');
                  });

                  const hasDueItems = customerItems.some(c => canPayNow(c.next_payment_date, daysBefore));
                  const isExpanded = expandedCustomerName === s.name;
                  
                  let breakdownHtml = '';
                  // Sort the breakdown list by lender name as well
                  const lenders = Object.keys(s.lenderTotals).sort((a, b) => a.localeCompare(b, 'th'));

                  // V.8.9 Unified summary UI
                  if (isSpecialView) {
                      breakdownHtml = `
                          <div class="w-full flex flex-col items-end">
                              <div class="flex items-center justify-end gap-3 mb-2 w-full border-b pb-1" style="border-color: ${dark ? '#4b5563' : '#e5e7eb'}60;">

                                  <span class="text-sm font-semibold opacity-70 w-24 text-right" style="color: ${textColor};">ยอดรวม</span>
                              </div>
                      `;

                      breakdownHtml += lenders.map(lender => {
                          const lenderColor = getLenderColor(lender, dark);
                          return `
                          <div class="flex items-center justify-end gap-3 mb-2 w-full">
                              <span class="text-base font-bold" style="color: ${lenderColor};">${lender}</span>
                              <span class="text-xl font-bold w-24 text-right" style="color: ${textColor};">฿${s.lenderTotals[lender].toLocaleString()}</span>
                          </div>

                      // แสดงยอดรวมเฉพาะกรณีที่มีผู้ให้บริการหลายคนเพื่อไม่ให้ข้อมูลซ้ำซ้อน
                      if (lenders.length > 1) {
                          breakdownHtml += `
                                  <div class="flex items-center justify-end gap-3 mt-2 pt-2 border-t w-full" style="border-color: ${dark ? '#4b5563' : '#e5e7eb'};">
                                      <span class="text-base font-semibold opacity-80" style="color: ${textColor};">รวมทุกสัญญา</span>
                                      <span class="text-2xl font-bold w-24 text-right" style="color: ${primaryColor};">฿${s.totalNextMonth.toLocaleString()}</span>
                                  </div>
                          `;
                      }
                      
                      breakdownHtml += `</div>`;
                  } else {
                      breakdownHtml = `
                          <div class="flex flex-col items-end">
                              <span class="text-sm font-semibold opacity-80 uppercase mb-1" style="color: ${textColor};">ยอดรวมงวดถัดไป</span>
                              <p class="text-2xl font-bold" style="color: ${primaryColor};">฿${s.totalNextMonth.toLocaleString()}</p>
                          </div>
                      `;
                  }

                  let html = `
                  <div class="border rounded-xl overflow-hidden transition-all duration-300 transform hover:-translate-y-1 hover:shadow-md" style="border-color: ${dark?'#374151':'#e5e7eb'}; background: ${isExpanded ? (dark?'#1f2937':'#f9fafb') : 'transparent'};">
                    <div class="py-4 px-4 flex flex-col sm:flex-row justify-between items-start sm:items-center cursor-pointer" onclick="window.toggleCustomerExpand('${s.name}')">
                        
                        <div class="flex items-center gap-6 mb-3 sm:mb-0 w-full sm:w-auto">
                            <div class="flex flex-col justify-center">
                                <p class="font-bold text-lg flex items-center gap-2" style="color: ${textColor};">
                                    ${s.name}
                                    <span class="text-[10px] opacity-50 transition-transform duration-300 ${isExpanded ? 'rotate-180' : ''}">▼</span>
                                </p>
                            </div>
                            <div class="flex flex-col border-l-2 pl-6" style="border-color: ${dark ? '#374151' : '#e5e7eb'};">
                                <span class="text-[11px] font-semibold opacity-60 uppercase mb-1" style="color: ${textColor};">จำนวนรายการ</span>
                                <p class="font-bold text-lg" style="color: ${primaryColor};">
                                    ${s.count} <span class="text-sm font-normal opacity-70" style="color: ${textColor};">สัญญา</span>
                                </p>
                            </div>
                        </div>

                        <div class="flex flex-col items-end gap-2 w-full sm:w-auto">
                            <div class="text-right w-full flex flex-col items-end">
                                ${breakdownHtml}

                            ${canEditData() ? `<button data-pay-all="${s.name}" onclick="event.stopPropagation();" class="px-4 py-2.5 rounded-lg text-sm font-medium shadow-sm transition-all hover:shadow-md ${hasDueItems ? '' : 'payment-disabled cursor-not-allowed'}" style="background: ${hasDueItems ? '#10b981' : '#9ca3af'}; color: white;" ${hasDueItems ? '' : 'disabled'}>💳 ชำระทั้งหมด</button>` : ''}
                        </div>
                    </div>
                  `;

                  if (isExpanded) {
                      html += `
                      <div class="border-t p-4 overflow-x-auto" style="border-color: ${dark?'#374151':'#e5e7eb'};">
                          <table class="w-full min-w-[700px] text-sm">
                              <thead style="color: ${textColor}; border-bottom: 2px solid ${dark?'#374151':'#e5e7eb'};">
                                  <tr>
                                      <th class="px-3 py-2 text-left font-semibold">สินค้า</th>
                                      <th class="px-3 py-2 text-left font-semibold">ราคาสินค้า</th>
                                      <th class="px-3 py-2 text-left font-semibold">ค่างวด</th>
                                      <th class="px-3 py-2 text-left font-semibold">งวดทั้งหมด</th>
                                      <th class="px-3 py-2 text-left font-semibold">งวดถัดไป</th>
                                      <!-- For guests, this column will show the account owner instead of manage buttons -->
                                      <th class="px-3 py-2 text-center font-semibold">${canEditData() ? 'จัดการ' : 'ผู้ให้บริการสินเชื่อ'}</th>
                                  </tr>
                              </thead>
                              <tbody>
                                  ${customerItems.map((c) => {
                                      const canPay = canPayNow(c.next_payment_date, daysBefore);
                                      const hasEditPermission = canEditData();
                                      
                                      let ownerName = '-';
                                      const o = allRecords.find(r => r.type === 'user' && r.id === c.account_id);
                                      if(o) ownerName = o.username;

                                      const lenderColor = getLenderColor(ownerName, dark);
                                      
                                      return `
                                      <tr class="border-b last:border-b-0 hover:bg-gray-50 dark:hover:bg-gray-800 transition-colors" style="border-color: ${dark?'#374151':'#f3f4f6'};">
                                          <td class="px-3 py-3 font-medium" style="color: ${textColor};">${c.product}</td>
                                          <td class="px-3 py-3 opacity-80" style="color: ${textColor};">฿${(c.product_price||0).toLocaleString()}</td>
                                          <td class="px-3 py-3 font-semibold" style="color: ${primaryColor};">฿${c.monthly_payment.toLocaleString()}</td>

                                      `;

                      `;

                  html += `</div>`;
                  return html;

    function renderHistory(config, dark, surfaceColor, textColor, primaryColor) {
      const history = getHistoryRecords();
      return `
        <div class="p-4 md:p-8 max-w-4xl mx-auto">
            <h2 class="text-2xl font-bold mb-8" style="color: ${textColor};">${config.menu_history}</h2>
            
            <div class="space-y-8 relative border-l-2 ml-3 md:ml-6" style="border-color: ${dark ? '#374151' : '#e5e7eb'};">
                ${history.length === 0 ? `<div class="pl-8 text-sm opacity-60" style="color: ${textColor};">ไม่พบประวัติการทำรายการ</div>` : ''}
                ${history.map((h, idx) => {
                    let actionColor = primaryColor;
                    if(h.history_action.includes('เพิ่ม')) actionColor = '#2563eb'; // Blue
                    else if(h.history_action.includes('แก้ไข')) actionColor = '#d97706'; // Dark Yellow
                    else if(h.history_action.includes('ลบ')) actionColor = '#dc2626'; // Red
                    else if(h.history_action.includes('ครบ') || h.history_action.includes('ปิด')) actionColor = '#16a34a'; // Green
                    
                    return `
                    <div class="relative pl-8 md:pl-10">
                        <!-- Dot -->
                        <span class="absolute -left-[9px] top-4 w-4 h-4 rounded-full border-4" 
                            style="background-color: ${actionColor}; border-color: ${dark ? '#111827' : '#f3f4f6'};"></span>
                        
                        <!-- Content Card -->
                        <div class="p-5 rounded-xl shadow-sm border mb-6 relative group transition-all hover:-translate-y-1" 
                            style="background: ${surfaceColor}; border-color: ${dark ? '#374151' : '#e5e7eb'}; color: ${textColor};">
                            
                            <!-- Arrow -->
                            <div class="absolute w-3 h-3 rotate-45 -left-[7px] top-6 border-l border-b" 
                                style="background: ${surfaceColor}; border-color: ${dark ? '#374151' : '#e5e7eb'};"></div>

                            <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between mb-2">
                                <h3 class="text-lg font-bold" style="color: ${actionColor};">
                                    ${h.history_action}
                                </h3>
                                <span class="text-xs font-mono px-2 py-1 rounded bg-gray-100 dark:bg-gray-700 opacity-70 mt-1 sm:mt-0 w-fit">
                                    ${new Date(h.history_date).toLocaleString('th-TH')}
                                </span>
                            </div>
                            
                            <p class="text-sm opacity-80 leading-relaxed">
                                ${h.history_details}
                            </p>
                        </div>
                    </div>
                `}).join('')}
            </div>
        </div>
      `;
    }

      const currentDarkMode = settings ? settings.is_dark_mode : false;
      const currentDaysBefore = settings ? settings.payment_days_before : 5;
      const currentPermissions = (currentUser.isAdmin || !settings) ? 
        (settings.guest_permissions || 'manage,history,changelog') : 
        (settings.guest_permissions || 'manage,history,changelog');
      const isAdmin = currentUser && currentUser.isAdmin;

      return `<div class="p-4 md:p-8 max-w-2xl mx-auto"><h2 class="text-2xl font-bold mb-6" style="color: ${textColor};">${config.menu_settings}</h2><div class="space-y-6">

      <!-- Theme Settings -->

          <label class="flex items-center gap-3 cursor-pointer">
            <input type="checkbox" id="dark-mode-toggle" ${currentDarkMode ? 'checked' : ''} class="w-5 h-5 rounded" style="accent-color: ${primaryColor};">
            <span style="color: ${textColor};">เปิดโหมดมืด</span>

    function attachEventListeners() {
      const mobileMenuBtn = document.getElementById('mobile-menu-btn');
      if(mobileMenuBtn) mobileMenuBtn.addEventListener('click', toggleMobileSidebar);
      
      const closeSidebarBtn = document.getElementById('close-sidebar-btn');
      if(closeSidebarBtn) closeSidebarBtn.addEventListener('click', toggleMobileSidebar);

      const sidebarOverlay = document.getElementById('sidebar-overlay');
      if(sidebarOverlay) sidebarOverlay.addEventListener('click', toggleMobileSidebar);
    
      const loginBtn = document.getElementById('login-btn');
      if (loginBtn) loginBtn.addEventListener('click', (e) => {
          e.preventDefault();
          const u = document.getElementById('login-username').value;
          const p = document.getElementById('login-password').value;
          const remember = document.getElementById('remember-me') ? document.getElementById('remember-me').checked : false;
          if(!u || !p) return showToast('กรุณากรอกข้อมูล', true);
          loginBtn.innerHTML = '<div class="spinner"></div>';
          if(!login(u,p, remember)) { showToast('ข้อมูลไม่ถูกต้อง', true); loginBtn.innerHTML = 'เข้าสู่ระบบ'; }
      });

      ['login-username', 'login-password'].forEach(id => {
          const el = document.getElementById(id);
          if (el) {
              el.addEventListener('keyup', (e) => {
                  if (e.key === 'Enter') {
                      document.getElementById('login-btn').click();
                  }
              });
          }
      });

      const guestBtn = document.getElementById('guest-continue-btn');
      if(guestBtn) guestBtn.addEventListener('click', () => {
          currentUser = { 
              id: 'guest', 
              username: `หน้าตรวจสอบยอด`, 
              isGuestView: true, 
              targetAccountId: 'ALL'
          };
          currentView = 'manage';
          sessionStorage.setItem('currentUser', JSON.stringify(currentUser));
          renderApp();
      });

      const toggle = (hideId, showId) => {
          document.getElementById(hideId).classList.add('hidden');
          document.getElementById(showId).classList.remove('hidden');
      };
      
      const regBtn = document.getElementById('show-register-btn');
      if(regBtn) regBtn.addEventListener('click', () => { toggle('login-form', 'register-form'); });
      
      const resetBtn = document.getElementById('show-reset-btn');
      if(resetBtn) resetBtn.addEventListener('click', () => toggle('login-form', 'reset-form'));
      
      const backBtns = document.querySelectorAll('[id^=back-from], [id^=back-to]');
      backBtns.forEach(b => b.addEventListener('click', () => {
          ['register-form', 'reset-form', 'guest-select-form'].forEach(id => {
              const el = document.getElementById(id);
              if (el) el.classList.add('hidden');
          });
          document.getElementById('login-form').classList.remove('hidden');
      }));

      const doRegister = document.getElementById('register-btn');
      if(doRegister) doRegister.addEventListener('click', async (e) => {
          e.preventDefault();
          const u = document.getElementById('register-username').value;
          const p = document.getElementById('register-password').value;
          if(!u || !p) return showToast('กรอกข้อมูลให้ครบ', true);
          doRegister.innerHTML = '<div class="spinner"></div>';
          if(await register(u,p)) toggle('register-form', 'login-form');
          doRegister.innerHTML = 'ลงทะเบียน';
      });

      const doReset = document.getElementById('reset-btn');
      if(doReset) doReset.addEventListener('click', async (e) => {
          e.preventDefault();
          const u = document.getElementById('reset-username').value;
          const k = document.getElementById('reset-admin').value;
          const p = document.getElementById('reset-newpassword').value;
          if(!u||!k||!p) return showToast('กรอกข้อมูลให้ครบ', true);
          doReset.innerHTML = '<div class="spinner"></div>';
          if(await resetPassword(u,k,p)) toggle('reset-form', 'login-form');
          doReset.innerHTML = 'รีเซ็ตรหัสผ่าน';
      });

      const logoutBtn = document.getElementById('logout-btn');
      if(logoutBtn) logoutBtn.addEventListener('click', logout);

      document.querySelectorAll('[data-view]').forEach(b => b.addEventListener('click', (e) => { 
          currentView = e.currentTarget.dataset.view; 
          isMobileSidebarOpen = false;
          renderApp(); 
      }));

      const addForm = document.getElementById('add-customer-form');
      if(addForm) {
          const updateCalc = () => {
              const name = document.getElementById('customer-name').value.trim();
              const product = document.getElementById('product').value.trim();
              const p = parseFloat(document.getElementById('product-price').value);
              const r = parseFloat(document.getElementById('interest-rate').value);
              const n = parseInt(document.getElementById('installments').value);
              const fStr = document.getElementById('bill-fee').value;
              const f = parseFloat(fStr);

              const isValid = name && product && !isNaN(p) && p > 0 && 
                              !isNaN(r) && !isNaN(n) && n > 0 && 
                              fStr !== '' && !isNaN(f);

              const display = document.getElementById('bill-amount-display');
              const input = document.getElementById('bill-amount-input');
              const detailsDiv = document.getElementById('calculation-details');

              if (isValid) {
                  const m = Math.round((p * (1 + (r/100*n))) / n) + f;
                  
                  if(display) display.value = '฿' + m.toLocaleString();
                  if(input) input.value = m;

                  if (detailsDiv) {
                      detailsDiv.classList.remove('hidden');
                      const totalInterest = p * (r/100) * n;
                      const grandTotal = p + totalInterest + (f * n);
                      
                      document.getElementById('detail-principal').textContent = '฿' + p.toLocaleString();
                      document.getElementById('detail-interest').textContent = '฿' + totalInterest.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2});
                      document.getElementById('detail-total').textContent = '฿' + grandTotal.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2});
                  }
              } else {
                  if(display) display.value = '';
                  if(input) input.value = '';
                  if(detailsDiv) detailsDiv.classList.add('hidden');
              }
          };
          addForm.addEventListener('input', updateCalc);
          
          addForm.addEventListener('submit', async (e) => {
              e.preventDefault();
              const btn = document.getElementById('save-customer-btn');
              btn.disabled=true; btn.innerHTML='<div class="spinner"></div>';
              await addCustomer({
                  customerName: document.getElementById('customer-name').value,
                  product: document.getElementById('product').value,
                  productPrice: parseFloat(document.getElementById('product-price').value),
                  interestRate: parseFloat(document.getElementById('interest-rate').value),
                  installments: parseInt(document.getElementById('installments').value),
                  billAmount: document.getElementById('bill-amount-input').value,
                  billFee: parseFloat(document.getElementById('bill-fee').value)||0,
                  contractDate: document.getElementById('contract-date').value
              });
              btn.disabled=false; btn.innerHTML='บันทึกข้อมูลลูกค้า';
          });
      }

      document.querySelectorAll('[data-pay]').forEach(b => b.addEventListener('click', async (e) => {
          const id = e.currentTarget.dataset.pay;
          e.currentTarget.innerHTML = '<div class="spinner" style="width:12px;height:12px;"></div>';
          await makePayment(id);
      }));
      
      document.querySelectorAll('[data-pay-all]').forEach(b => b.addEventListener('click', async (e) => {
          const name = e.currentTarget.dataset.payAll;
          if(confirm(`ยืนยันการชำระยอดรวมทั้งหมดของลูกค้า ${name}?`)) {
              e.currentTarget.innerHTML = '<div class="spinner" style="width:16px;height:16px;"></div>';
              await payAllForCustomer(name);
              renderApp();
          }
      }));

      document.querySelectorAll('[data-edit]').forEach(b => b.addEventListener('click', (e) => {
          editingCustomer = e.currentTarget.dataset.edit;
          renderApp();
      }));

      const searchInput = document.getElementById('manage-search-input');
      if(searchInput) {
          searchInput.addEventListener('input', (e) => {
              manageSearchTerm = e.target.value;
              renderApp();
              setTimeout(() => {
                  const input = document.getElementById('manage-search-input');
                  if(input) {
                      input.focus();
                      const val = input.value;
                      input.value = '';
                      input.value = val;
                  }
              }, 0);
          });
      }
      
      const clearSearchBtn = document.getElementById('manage-search-clear');
      if(clearSearchBtn) {
          clearSearchBtn.addEventListener('click', () => {
              manageSearchTerm = '';
              renderApp();
          });
      }

      document.querySelectorAll('[data-delete-user]').forEach(b => b.addEventListener('click', (e) => {
          if(confirm('คุณต้องการลบบัญชีนี้ใช่หรือไม่?')) deleteUser(e.currentTarget.dataset.deleteUser);
      }));
      document.querySelectorAll('[data-reset-user]').forEach(b => b.addEventListener('click', (e) => {
          editingUser = e.currentTarget.dataset.resetUser;
          renderApp();
      }));

      // V.9.2: Detailed Edit History Logic
      const editForm = document.getElementById('edit-customer-form');
      if(editForm) {
          editForm.addEventListener('submit', async (e) => {
              e.preventDefault();
              
              const customer = allRecords.find(r => r.id === editingCustomer);
              const newContractDate = document.getElementById('edit-contract-date').value;
              const newMonthlyPayment = parseFloat(document.getElementById('edit-monthly-payment').value);
              const newInstallments = parseInt(document.getElementById('edit-installments').value);
              let nextPaymentDate = customer.next_payment_date;

              if (customer) {
                  const paid = customer.paid_installments || 0;
                  nextPaymentDate = addMonthsToDate(newContractDate, paid + 1);
              }

              // Update data and generate detail history inside updateCustomer function
              await updateCustomer(editingCustomer, {
                  customer_name: document.getElementById('edit-customer-name').value,
                  product: document.getElementById('edit-product').value,
                  product_price: parseFloat(document.getElementById('edit-product-price').value),
                  monthly_payment: newMonthlyPayment,
                  installments: newInstallments,
                  contract_date: newContractDate,
                  next_payment_date: nextPaymentDate 
              });
          });
          document.getElementById('cancel-edit-btn').addEventListener('click', hideModal);
          
          document.getElementById('delete-customer-btn')?.addEventListener('click', async () => { 
              if(confirm('คุณต้องการลบข้อมูลลูกค้านี้ใช่หรือไม่? การกระทำนี้ไม่สามารถย้อนกลับได้')) {
                  await deleteCustomer(editingCustomer);
                  hideModal();
              }
          });
          
          document.getElementById('confirm-delete-btn')?.addEventListener('click', async () => { await deleteCustomer(confirmDeleteId); hideModal(); });
      }

      const adminResetForm = document.getElementById('admin-reset-form');
      if(adminResetForm) {
          adminResetForm.addEventListener('submit', async (e) => {
              e.preventDefault();
              const newPass = document.getElementById('admin-new-pass').value;
              if(!newPass) return showToast('กรุณากรอกรหัสผ่าน', true);
              await adminResetPassword(editingUser, newPass);
          });
          
          const cancelAdminReset = document.getElementById('cancel-admin-reset-btn');
          if(cancelAdminReset) cancelAdminReset.addEventListener('click', hideModal);
      }

      const dm = document.getElementById('dark-mode-toggle');
      if(dm) dm.addEventListener('change', (e) => { if(e.target.checked) document.documentElement.classList.add('dark'); else document.documentElement.classList.remove('dark'); });
      const saveSet = document.getElementById('save-settings-btn');
      if(saveSet) saveSet.addEventListener('click', async () => {
          saveSet.innerHTML = '<div class="spinner"></div>';
          const perms = [];
          ['add','manage','history','changelog','settings','edit'].forEach(p => { if(document.getElementById(`guest-${p}`)?.checked) perms.push(p); });
          
          await saveSettings({
              is_dark_mode: dm.checked,
              payment_days_before: parseInt(document.getElementById('payment-days-before').value),
              guest_permissions: perms.join(',')
          });
          saveSet.innerHTML = 'บันทึกการตั้งค่า';
      });

      const saveConn = document.getElementById('save-connection-btn');
      if(saveConn) saveConn.addEventListener('click', () => {
          const url = document.getElementById('setting-supabase-url').value;
          const key = document.getElementById('setting-supabase-key').value;
          if(!url || !key) return showToast('กรุณากรอกข้อมูลให้ครบถ้วน', true);
          
          localStorage.setItem('app_supabase_config', JSON.stringify({ url, key }));
          showToast('บันทึกค่าเชื่อมต่อเรียบร้อย ระบบจะรีโหลด...');
          setTimeout(() => location.reload(), 1500);
      });

      const resetConn = document.getElementById('reset-connection-btn');
      if(resetConn) resetConn.addEventListener('click', () => {
          if(confirm('คุณต้องการรีเซ็ตค่าการเชื่อมต่อเป็นค่าเริ่มต้นหรือไม่?')) {
              localStorage.removeItem('app_supabase_config');
              showToast('รีเซ็ตค่าเรียบร้อย ระบบจะรีโหลด...');
              setTimeout(() => location.reload(), 1500);
          }
      });
    }

    async function init() {
      window.dataSdk.init(dataHandler); 
      checkLogin();
      window.elementSdk.init({ defaultConfig, onConfigChange: () => renderApp() });
      renderApp();
    }

    init();
  </script>
 </body>
</html>
